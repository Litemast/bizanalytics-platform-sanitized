services:
  db:
    image: postgres:17-alpine
    container_name: bizanalytics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: bizanalytics-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      EnableHttpsRedirection: "false"
      ConnectionStrings__Db: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      MarketData__FmpBaseUrl: ${FMP_BASE_URL}
      MarketData__FmpApiKey: ${FMP_API_KEY}
      MarketData__AlphaVantageBaseUrl: ${ALPHA_VANTAGE_BASE_URL}
      MarketData__AlphaVantageApiKey: ${ALPHA_VANTAGE_API_KEY}
      KgdRegistry__Mode: ${KGD_REGISTRY_MODE:-live}
      KgdRegistry__BaseUrl: ${KGD_PORTAL_BASE_URL:-https://portal.kgd.gov.kz}
      KgdRegistry__PortalToken: ${KGD_PORTAL_TOKEN}
    ports:
      - "${APP_PORT:-80}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
